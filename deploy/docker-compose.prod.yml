services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claude_trade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-claude_trade}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claude_trade}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: journald
      options:
        tag: postgres
    restart: unless-stopped

  ib-gateway:
    build:
      context: .
      dockerfile: Dockerfile.ib-gateway
    image: claude-trade/ib-gateway:latest
    entrypoint: ["/bin/sh", "/opt/ib-entrypoint.sh"]
    volumes:
      - ../scripts/ib-gateway-entrypoint.sh:/opt/ib-entrypoint.sh:ro
      - ../scripts/auto-reconnect.sh:/opt/auto-reconnect.sh:ro
      - ibjts:/home/ibgateway/Jts
    logging:
      driver: journald
      options:
        tag: ib-gateway
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: "true"
      TWOFA_TIMEOUT_ACTION: restart
      READ_ONLY_API: "no"
      # 既存セッション検出時の動作 (IBC userguide: https://github.com/IbcAlpha/IBC/blob/master/userguide.md)
      # primary         = 自分が残り、相手に退くよう要求。相手も primary だと膠着（デッドロック）
      # primaryoverride = 問答無用で自分が乗っ取る。再起動ループ時に前セッションを強制排除できる
      # secondary       = 既存セッションがあれば自分が退く
      # → 再起動後に前セッション（同じ自分）と競合してループするため primaryoverride を使う
      EXISTING_SESSION_DETECTED_ACTION: primaryoverride
      IB_RESTART_DELAY: "180"
      # VNC: 週次手動ログイン用 (IB Key Challenge-Response を GUI で完了するため)
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD}
    network_mode: host
    restart: unless-stopped

volumes:
  pgdata:
  ibjts:
