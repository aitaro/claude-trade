provider = "google"
client_id = ""
client_secret_file = "/opt/claude-trade/deploy/.oauth2-client-secret"
cookie_secret_file = "/opt/claude-trade/deploy/.oauth2-cookie-secret"

http_address = "127.0.0.1:4180"
redirect_url = ""

# Email allowlist
email_domains = ["*"]
authenticated_emails_file = "/opt/claude-trade/deploy/allowed-emails.txt"

# Caddy handles routing; oauth2-proxy only does auth
upstreams = ["static://200"]

cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"

# Skip the "Sign in with Google" button, go straight to Google
skip_provider_button = true
