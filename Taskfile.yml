version: "3"

vars:
  SESSION: claude-trade

tasks:
  # ── 開発環境 ──

  dev:
    desc: "開発環境をtmuxで一括起動"
    cmds:
      - scripts/dev-tmux.sh

  dev:attach:
    desc: "起動中の開発環境tmuxセッションにアタッチ"
    cmds:
      - tmux attach-session -t {{.SESSION}}

  dev:stop:
    desc: "開発環境を停止"
    cmds:
      - tmux kill-session -t {{.SESSION}} 2>/dev/null || true

  dev:restart:
    desc: "開発環境を再起動"
    cmds:
      - tmux kill-session -t {{.SESSION}} 2>/dev/null || true
      - scripts/dev-tmux.sh

  # ── インフラ ──

  infra:
    desc: "Docker インフラ起動 (postgres + ib-gateway + pgweb)"
    cmds:
      - docker compose up -d

  infra:stop:
    desc: "Docker インフラ停止"
    cmds:
      - docker compose down

  infra:logs:
    desc: "インフラのログ表示"
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  # ── Research Agent ──

  research:
    desc: "Research Agent 単発実行 (例: task research -- intraday --market us)"
    cmds:
      - npx tsx packages/server/src/agent/main.ts run {{.CLI_ARGS | default "intraday --market us"}}

  scheduler:
    desc: "Agent スケジューラ起動"
    cmds:
      - npx tsx packages/server/src/agent/main.ts scheduler

  # ── Trading Engine ──

  trade:
    desc: "Trading Engine 単発実行 (例: task trade -- --market us)"
    cmds:
      - npx tsx packages/server/src/trading-engine/main.ts {{.CLI_ARGS | default "--market us"}}

  # ── DB ──

  db:migrate:
    desc: "DB マイグレーション (スキーマ同期)"
    cmds:
      - npx drizzle-kit push

  db:generate:
    desc: "Drizzle マイグレーションファイル生成"
    cmds:
      - npx drizzle-kit generate

  db:web:
    desc: "pgweb を開く (http://localhost:8081)"
    cmds:
      - open http://localhost:8081

  db:psql:
    desc: "psql で DB に接続"
    cmds:
      - docker compose exec postgres psql -U claude_trade -d claude_trade

  db:signals:
    desc: "アクティブなシグナルを表示"
    cmds:
      - docker compose exec postgres psql -U claude_trade -d claude_trade -c "SELECT symbol, signal_type, strength, confidence, source_strategy, created_at FROM signals WHERE is_active = true AND expires_at > now() ORDER BY created_at DESC;"

  # ── セットアップ ──

  setup:
    desc: "初回セットアップ"
    cmds:
      - cp -n .env.example .env || true
      - echo "==> .env を編集してください (TWS_USERID, TWS_PASSWORD, FINNHUB_API_KEY)"
      - docker compose up -d
      - npm install
      - npx drizzle-kit push
      - echo "==> セットアップ完了"

  # ── API & Web ──

  api:
    desc: "tRPC API サーバー起動 (port 3100)"
    cmds:
      - npx tsx packages/server/src/api/server.ts

  web:
    desc: "Web ダッシュボード起動 (dev mode)"
    dir: packages/web
    cmds:
      - npx vite

  web:build:
    desc: "Web ダッシュボードビルド"
    dir: packages/web
    cmds:
      - npx vite build

  # ── GCE ──

  gce:run:
    desc: "GCE で Research Agent を1回だけ実行 (例: task gce:run -- intraday --market us)"
    vars:
      ARGS: '{{.CLI_ARGS | default "intraday --market us"}}'
    cmds:
      - gcloud compute ssh claude-trade --project=aitaro-claude-trade --zone=europe-west2-a --command='cd /opt/claude-trade && export $(grep -v "^#" .env | xargs) && /usr/bin/node --import tsx packages/server/src/agent/main.ts run {{.ARGS}}'

  gce:log:
    desc: "GCE ログをtmux 4ペインで表示"
    cmds:
      - scripts/gce-logs.sh

  gce:ssh:
    desc: "GCE に SSH"
    cmds:
      - gcloud compute ssh claude-trade --project=aitaro-claude-trade --zone=europe-west2-a

  gce:status:
    desc: "GCE サービス状態確認"
    cmds:
      - gcloud compute ssh claude-trade --project=aitaro-claude-trade --zone=europe-west2-a --command='sudo systemctl status claude-trade-api claude-trade-scheduler oauth2-proxy caddy --no-pager'

  # ── Lint & Build ──

  lint:
    desc: "Biome lint + format check"
    cmds:
      - npx biome check .

  lint:fix:
    desc: "Biome lint + format fix"
    cmds:
      - npx biome check --write .

  typecheck:
    desc: "型チェック (server)"
    cmds:
      - npx tsc -p packages/server/tsconfig.json --noEmit
